<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Corner Café - Order & Enjoy</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --coffee-dark: #2C1810;
            --coffee-medium: #6F4E37;
            --coffee-light: #D4A574;
            --cream: #F5F5DC;
            --warm-white: #FAF7F2;
            --accent: #E8843C;
            --success: #4CAF50;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--warm-white);
            color: var(--coffee-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes steam {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-20px) scale(1.5); opacity: 0; }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--coffee-dark) 0%, var(--coffee-medium) 100%);
            color: white;
            padding: 1.5rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            font-size: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        .table-badge {
            background: var(--accent);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }

        .table-badge.active {
            display: flex;
        }

        /* Main Container */
        .main-container {
            margin-top: 80px;
            min-height: calc(100vh - 80px);
        }

        /* Table Selection Screen */
        .table-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 80px);
            padding: 2rem;
            background: 
                radial-gradient(circle at 20% 50%, rgba(212, 165, 116, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(232, 132, 60, 0.1) 0%, transparent 50%);
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        .welcome-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--coffee-dark);
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .welcome-text p {
            font-size: 1.2rem;
            color: var(--coffee-medium);
            max-width: 500px;
            margin: 0 auto;
        }

        .table-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            max-width: 600px;
            width: 100%;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .table-btn {
            aspect-ratio: 1;
            border: 3px solid var(--coffee-light);
            background: white;
            border-radius: 20px;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--coffee-medium);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .table-btn:hover {
            transform: translateY(-5px) scale(1.05);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 10px 30px rgba(232, 132, 60, 0.2);
        }

        .table-btn .table-icon {
            font-size: 1.2rem;
        }

        /* Menu Screen */
        .menu-screen {
            display: none;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .menu-screen.active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        .menu-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .menu-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--coffee-dark);
            margin-bottom: 0.5rem;
        }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .category-tab {
            padding: 0.8rem 1.5rem;
            border: 2px solid var(--coffee-light);
            background: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            color: var(--coffee-medium);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .category-tab:hover,
        .category-tab.active {
            background: var(--coffee-dark);
            color: white;
            border-color: var(--coffee-dark);
            transform: translateY(-2px);
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 100px;
        }

        .menu-item {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        }

        .item-image {
            height: 180px;
            background: linear-gradient(135deg, var(--cream) 0%, var(--coffee-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            position: relative;
            overflow: hidden;
        }

        .item-image::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .item-details {
            padding: 1.5rem;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.5rem;
        }

        .item-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--coffee-dark);
        }

        .item-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .item-description {
            color: var(--coffee-medium);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .add-to-cart {
            width: 100%;
            padding: 0.8rem;
            background: var(--coffee-dark);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .add-to-cart:hover {
            background: var(--accent);
            transform: scale(1.02);
        }

        /* Cart Floating Button */
        .cart-fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 70px;
            height: 70px;
            background: var(--accent);
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(232, 132, 60, 0.4);
            transition: all 0.3s ease;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-fab:hover {
            transform: scale(1.1) rotate(10deg);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--coffee-dark);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 700;
            border: 3px solid var(--warm-white);
        }

        /* Cart Modal */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: flex-end;
        }

        .cart-modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        .cart-panel {
            width: 100%;
            max-width: 450px;
            background: white;
            height: 100%;
            padding: 2rem;
            overflow-y: auto;
            animation: slideIn 0.3s ease-out;
            display: flex;
            flex-direction: column;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--cream);
        }

        .cart-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--coffee-dark);
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--coffee-medium);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-cart:hover {
            background: var(--cream);
            color: var(--coffee-dark);
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: var(--warm-white);
            border-radius: 15px;
            margin-bottom: 1rem;
            align-items: center;
        }

        .cart-item-image {
            width: 60px;
            height: 60px;
            background: var(--coffee-light);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            color: var(--coffee-dark);
            margin-bottom: 0.2rem;
        }

        .cart-item-price {
            color: var(--accent);
            font-weight: 600;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            border: 2px solid var(--coffee-light);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--coffee-dark);
            transition: all 0.2s ease;
        }

        .qty-btn:hover {
            background: var(--coffee-dark);
            color: white;
            border-color: var(--coffee-dark);
        }

        .qty-value {
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }

        .remove-item {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.5rem;
            transition: transform 0.2s ease;
        }

        .remove-item:hover {
            transform: scale(1.2);
        }

        .cart-footer {
            border-top: 2px solid var(--cream);
            padding-top: 1.5rem;
            margin-top: auto;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--coffee-dark);
            margin-bottom: 1rem;
        }

        .whatsapp-btn {
            width: 100%;
            padding: 1rem;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .whatsapp-btn:hover {
            background: #128C7E;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
        }

        .empty-cart {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--coffee-medium);
        }

        .empty-cart-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Notes Section */
        .order-notes {
            margin: 1rem 0;
        }

        .order-notes textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--coffee-light);
            border-radius: 10px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
        }

        .order-notes textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .table-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .welcome-text h1 {
                font-size: 2rem;
            }

            .menu-grid {
                grid-template-columns: 1fr;
            }

            .category-tabs {
                gap: 0.5rem;
            }

            .category-tab {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--coffee-dark);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>

        <!-- Menu Screen -->
        <div class="menu-screen" id="menuScreen">

            <div class="category-tabs">

                </button>

    <!-- Cart Floating Button -->

    <!-- Cart Modal -->

                <h2>Your Order</h2>

            </div>

            <div class="cart-items" id="cartItems">
                <!-- Cart items generated by JS -->
            </div>

                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--coffee-dark);">
                    Special Instructions (Optional)
                </label>
                <textarea id="orderNotes" placeholder="Any allergies, preferences, or special requests..."></textarea>
            </div>

            <div class="cart-footer">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cartTotal">$0.00</span>

                <button class="whatsapp-btn" id="whatsappBtn">
                    <span>📱</span>
                    <span>Send Order via WhatsApp</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span>✓</span>
        <span id="toastMessage">Added to cart!</span>
    </div>

    <script>
        // Menu Data
        const menuItems = [
            // Coffee
            { id: 1, name: "Espresso", price: 3.50, category: "coffee", emoji: "☕", description: "Rich and bold single shot" },
            { id: 2, name: "Cappuccino", price: 4.50, category: "coffee", emoji: "☕", description: "Espresso with steamed milk foam" },
            { id: 3, name: "Latte", price: 4.50, category: "coffee", emoji: "🥛", description: "Espresso with lots of steamed milk" },
            { id: 4, name: "Americano", price: 3.50, category: "coffee", emoji: "☕", description: "Espresso diluted with hot water" },
            { id: 5, name: "Mocha", price: 5.00, category: "coffee", emoji: "🍫", description: "Chocolate espresso with steamed milk" },
            { id: 6, name: "Cold Brew", price: 4.50, category: "coffee", emoji: "🧊", description: "Steeped cold coffee for 12 hours" },

            // Tea
            { id: 7, name: "Earl Grey", price: 3.50, category: "tea", emoji: "🫖", description: "Classic bergamot flavored black tea" },
            { id: 8, name: "Green Tea", price: 3.50, category: "tea", emoji: "🍵", description: "Refreshing Japanese sencha" },
            { id: 9, name: "Chai Latte", price: 4.50, category: "tea", emoji: "🥤", description: "Spiced tea with steamed milk" },
            { id: 10, name: "Peppermint", price: 3.50, category: "tea", emoji: "🌿", description: "Refreshing herbal infusion" },

            // Sweets
            { id: 11, name: "Croissant", price: 3.50, category: "sweets", emoji: "🥐", description: "Buttery flaky pastry" },
            { id: 12, name: "Chocolate Cake", price: 5.50, category: "sweets", emoji: "🍰", description: "Rich layered chocolate cake" },
            { id: 13, name: "Cheesecake", price: 5.00, category: "sweets", emoji: "🍰", description: "Creamy New York style" },
            { id: 14, name: "Tiramisu", price: 5.50, category: "sweets", emoji: "🍮", description: "Coffee-flavored Italian dessert" },
            { id: 15, name: "Macarons (3pcs)", price: 4.50, category: "sweets", emoji: "🍬", description: "Assorted French macarons" },
            { id: 16, name: "Muffin", price: 3.00, category: "sweets", emoji: "🧁", description: "Blueberry or chocolate chip" },

            // Food
            { id: 17, name: "Avocado Toast", price: 6.50, category: "food", emoji: "🥑", description: "Sourdough with smashed avocado" },
            { id: 18, name: "Club Sandwich", price: 7.50, category: "food", emoji: "🥪", description: "Triple decker with turkey & bacon" },
            { id: 19, name: "Caesar Salad", price: 6.50, category: "food", emoji: "🥗", description: "Classic with parmesan croutons" },
            { id: 20, name: "Quiche", price: 5.50, category: "food", emoji: "🥧", description: "Spinach and cheese savory tart" },
            { id: 21, name: "Bagel with Cream Cheese", price: 4.00, category: "food", emoji: "🥯", description: "Toasted with scallion cream cheese" }
        ];

        // State
        let currentTable = null;
        let cart = [];
        let currentCategory = 'all';

        // DOM Elements
        const tableScreen = document.getElementById('tableScreen');
        const menuScreen = document.getElementById('menuScreen');
        const tableGrid = document.getElementById('tableGrid');
        const menuGrid = document.getElementById('menuGrid');
        const tableBadge = document.getElementById('tableBadge');
        const tableNumberDisplay = document.getElementById('tableNumberDisplay');
        const cartFab = document.getElementById('cartFab');
        const cartModal = document.getElementById('cartModal');
        const cartItems = document.getElementById('cartItems');
        const cartCount = document.getElementById('cartCount');
        const cartTotal = document.getElementById('cartTotal');
        const toast = document.getElementById('toast');

        // Initialize
        function init() {
            renderTables();
            renderMenu();
            setupEventListeners();
        }

        // Render Table Buttons
        function renderTables() {
            tableGrid.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.className = 'table-btn';
                btn.innerHTML = `
                    <span class="table-icon">🪑</span>
                    <span>${i}</span>
                `;
                btn.onclick = () => selectTable(i);
                tableGrid.appendChild(btn);
            }
        }

        // Select Table
        function selectTable(tableNum) {
            currentTable = tableNum;
            tableNumberDisplay.textContent = tableNum;
            tableBadge.classList.add('active');

            // Transition
            tableScreen.style.display = 'none';
            menuScreen.classList.add('active');
            cartFab.style.display = 'flex';

            showToast(`Welcome! You're at Table ${tableNum}`);
        }

        // Render Menu
        function renderMenu() {
            menuGrid.innerHTML = '';
            const filtered = currentCategory === 'all' 
                ? menuItems 
                : menuItems.filter(item => item.category === currentCategory);

            filtered.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'menu-item fade-in';
                card.style.animationDelay = `${index * 0.05}s`;
                card.innerHTML = `
                    <div class="item-image">${item.emoji}</div>
                    <div class="item-details">
                        <div class="item-header">
                            <div class="item-name">${item.name}</div>
                            <div class="item-price">$${item.price.toFixed(2)}</div>
                        </div>
                        <div class="item-description">${item.description}</div>
                        <button class="add-to-cart" onclick="addToCart(${item.id})">
                            <span>+</span>
                            <span>Add to Order</span>
                        </button>
                    </div>
                `;
                menuGrid.appendChild(card);
            });
        }

        // Add to Cart
        function addToCart(itemId) {
            const item = menuItems.find(i => i.id === itemId);
            const existing = cart.find(i => i.id === itemId);

            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ ...item, quantity: 1 });
            }

            updateCart();
            showToast(`${item.name} added to cart!`);
        }

        // Update Cart
        function updateCart() {
            cartCount.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);

            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <p>Your cart is empty</p>
                        <p style="font-size: 0.9rem; margin-top: 0.5rem;">Add some delicious items!</p>
                    </div>
                `;
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-image">${item.emoji}</div>
                        <div class="cart-item-details">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">$${(item.price * item.quantity).toFixed(2)}</div>
                        </div>
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                            <span class="qty-value">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                        </div>
                        <button class="remove-item" onclick="removeItem(${item.id})">🗑️</button>
                    </div>
                `).join('');
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotal.textContent = `$${total.toFixed(2)}`;
        }

        // Update Quantity
        function updateQuantity(itemId, change) {
            const item = cart.find(i => i.id === itemId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== itemId);
                }
                updateCart();
            }
        }

        // Remove Item
        function removeItem(itemId) {
            cart = cart.filter(i => i.id !== itemId);
            updateCart();
        }

        // Setup Event Listeners
        function setupEventListeners() {
            // Category Tabs
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = tab.dataset.category;
                    renderMenu();
                });
            });

            // Cart FAB
            cartFab.addEventListener('click', () => {
                cartModal.classList.add('active');
            });

            // Close Cart
            document.getElementById('closeCart').addEventListener('click', () => {
                cartModal.classList.remove('active');
            });

            // Close modal on outside click
            cartModal.addEventListener('click', (e) => {
                if (e.target === cartModal) {
                    cartModal.classList.remove('active');
                }
            });

            // WhatsApp Button
            document.getElementById('whatsappBtn').addEventListener('click', sendToWhatsApp);
        }

        // Send to WhatsApp
        function sendToWhatsApp() {
            if (cart.length === 0) {
                showToast('Please add items to your order first!');
                return;
            }

            const phoneNumber = '+9647504666698'; // Example for Iraq // Replace with actual number
            const notes = document.getElementById('orderNotes').value;

            let message = `*New Order - Table ${currentTable}*\n\n`;

            cart.forEach(item => {
                message += `• ${item.emoji} ${item.name} x${item.quantity} - $${(item.price * item.quantity).toFixed(2)}\n`;
            });

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            message += `\n*Total: $${total.toFixed(2)}*\n`;

            if (notes) {
                message += `\n*Notes:* ${notes}`;
            }

            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');

            // Reset after sending
            cart = [];
            updateCart();
            cartModal.classList.remove('active');
            document.getElementById('orderNotes').value = '';
            showToast('Order sent! Thank you!');
        }

        // Show Toast
        function showToast(message) {
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Start
        init();
    </script>
</body>
</html>
